<aside class="site-sidebar">
  <div class="site-sidebar__inner">
    <h1 class="site-title">
      <a href="/">
        <span>Phil</span>
        <span>in the</span>
        <span>Blank</span>
      </a>
    </h1>
    <nav class="site-nav" aria-label="Main navigation">
      <ul>
        {% for item in nav.items %}
        <li class="site-nav__item {% if item.url != '/' and item.url in page.url %}active{% elseif item.url == page.url %}active{% endif %}">
          <a href="{{ item.url }}">{{ item.text }}</a>
        </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</aside>
